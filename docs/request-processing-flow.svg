<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="980" viewBox="0 0 1800 980">
  <defs>
    <style>
      .bg { fill: #f5f7fb; }
      .title { fill: #102235; font-family: Arial, sans-serif; font-size: 30px; font-weight: 700; }
      .subtitle { fill: #566879; font-family: Arial, sans-serif; font-size: 16px; }
      .step { fill: #ffffff; stroke: #234c72; stroke-width: 2.5; rx: 18; ry: 18; }
      .step-head { fill: #234c72; }
      .step-title { fill: #ffffff; font-family: Arial, sans-serif; font-size: 19px; font-weight: 700; }
      .step-text { fill: #213140; font-family: Arial, sans-serif; font-size: 15px; }
      .small { fill: #5b6d7f; font-family: Arial, sans-serif; font-size: 13px; }
      .arrow { stroke: #4b7398; stroke-width: 3; fill: none; }
      .side-arrow { stroke: #7b97b2; stroke-width: 2.4; fill: none; stroke-dasharray: 8 6; }
      .decision { fill: #fff7e8; stroke: #c28a2e; stroke-width: 2.5; }
      .decision-text { fill: #6c4b12; font-family: Arial, sans-serif; font-size: 16px; font-weight: 700; }
      .lane { fill: #e3edf7; rx: 16; ry: 16; }
      .lane-title { fill: #234c72; font-family: Arial, sans-serif; font-size: 16px; font-weight: 700; }
      .note { fill: #4d6072; font-family: Arial, sans-serif; font-size: 14px; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#4b7398"/>
    </marker>
    <marker id="sideArrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#7b97b2"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1800" height="980"/>

  <text class="title" x="50" y="56">TrustService: Request Processing Flow</text>
  <text class="subtitle" x="50" y="84">End-to-end cycle of one product check: from URL acceptance to response delivery and persistence.</text>

  <rect class="lane" x="40" y="120" width="1720" height="740"/>
  <text class="lane-title" x="60" y="152">Main processing pipeline</text>

  <g transform="translate(70,210)">
    <rect class="step" width="180" height="130"/>
    <rect class="step-head" width="180" height="40"/>
    <text class="step-title" x="18" y="26">1. URL input</text>
    <text class="step-text" x="18" y="68">Browser extension</text>
    <text class="step-text" x="18" y="90">or dashboard sends</text>
    <text class="step-text" x="18" y="112">product URL to API</text>
  </g>

  <g transform="translate(300,210)">
    <rect class="step" width="210" height="130"/>
    <rect class="step-head" width="210" height="40"/>
    <text class="step-title" x="18" y="26">2. Parse URL</text>
    <text class="step-text" x="18" y="68">Backend identifies</text>
    <text class="step-text" x="18" y="90">marketplace and</text>
    <text class="step-text" x="18" y="112">extracts product_id</text>
  </g>

  <g transform="translate(570,190)">
    <polygon class="decision" points="110,0 220,90 110,180 0,90"/>
    <text class="decision-text" x="72" y="82">3. Cache hit</text>
    <text class="decision-text" x="92" y="106">in Redis?</text>
  </g>

  <g transform="translate(870,210)">
    <rect class="step" width="220" height="130"/>
    <rect class="step-head" width="220" height="40"/>
    <text class="step-title" x="18" y="26">4. Resolve in DB</text>
    <text class="step-text" x="18" y="68">Find seller, product</text>
    <text class="step-text" x="18" y="90">and stored reviews</text>
    <text class="step-text" x="18" y="112">in PostgreSQL</text>
  </g>

  <g transform="translate(1140,210)">
    <rect class="step" width="240" height="130"/>
    <rect class="step-head" width="240" height="40"/>
    <text class="step-title" x="18" y="26">5. Data enrichment</text>
    <text class="step-text" x="18" y="68">If needed, fetch page,</text>
    <text class="step-text" x="18" y="90">derive title/signals,</text>
    <text class="step-text" x="18" y="112">prepare payload</text>
  </g>

  <g transform="translate(1440,210)">
    <rect class="step" width="250" height="130"/>
    <rect class="step-head" width="250" height="40"/>
    <text class="step-title" x="18" y="26">6. Anti-fraud analysis</text>
    <text class="step-text" x="18" y="68">Python service computes</text>
    <text class="step-text" x="18" y="90">fake review risk and</text>
    <text class="step-text" x="18" y="112">rating manipulation risk</text>
  </g>

  <g transform="translate(330,500)">
    <rect class="step" width="230" height="140"/>
    <rect class="step-head" width="230" height="40"/>
    <text class="step-title" x="18" y="26">7. Trust score</text>
    <text class="step-text" x="18" y="68">Go backend combines</text>
    <text class="step-text" x="18" y="90">seller metrics, product</text>
    <text class="step-text" x="18" y="112">signals and ML risks</text>
  </g>

  <g transform="translate(650,500)">
    <rect class="step" width="250" height="140"/>
    <rect class="step-head" width="250" height="40"/>
    <text class="step-title" x="18" y="26">8. Save in PostgreSQL</text>
    <text class="step-text" x="18" y="68">Write analysis_runs,</text>
    <text class="step-text" x="18" y="90">trust_snapshots, reasons</text>
    <text class="step-text" x="18" y="112">and browser_checks</text>
  </g>

  <g transform="translate(980,500)">
    <rect class="step" width="220" height="140"/>
    <rect class="step-head" width="220" height="40"/>
    <text class="step-title" x="18" y="26">9. Cache in Redis</text>
    <text class="step-text" x="18" y="68">Store result with TTL</text>
    <text class="step-text" x="18" y="90">to speed up repeated</text>
    <text class="step-text" x="18" y="112">checks of same product</text>
  </g>

  <g transform="translate(1290,500)">
    <rect class="step" width="250" height="140"/>
    <rect class="step-head" width="250" height="40"/>
    <text class="step-title" x="18" y="26">10. Return response</text>
    <text class="step-text" x="18" y="68">Client receives</text>
    <text class="step-text" x="18" y="90">trust score, risks,</text>
    <text class="step-text" x="18" y="112">reasons and history</text>
  </g>

  <path class="arrow" marker-end="url(#arrow)" d="M250 275 L300 275"/>
  <path class="arrow" marker-end="url(#arrow)" d="M510 275 L570 275"/>
  <path class="arrow" marker-end="url(#arrow)" d="M790 280 L870 280"/>
  <path class="arrow" marker-end="url(#arrow)" d="M1090 275 L1140 275"/>
  <path class="arrow" marker-end="url(#arrow)" d="M1380 275 L1440 275"/>

  <path class="arrow" marker-end="url(#arrow)" d="M1565 340 C1565 430, 460 430, 460 500"/>
  <path class="arrow" marker-end="url(#arrow)" d="M560 570 L650 570"/>
  <path class="arrow" marker-end="url(#arrow)" d="M900 570 L980 570"/>
  <path class="arrow" marker-end="url(#arrow)" d="M1200 570 L1290 570"/>

  <path class="side-arrow" marker-end="url(#sideArrow)" d="M680 370 L680 450 L420 450 L420 500"/>
  <text class="small" x="604" y="392">yes: read cached result</text>

  <path class="side-arrow" marker-end="url(#sideArrow)" d="M1460 720 L1460 780 L160 780 L160 340"/>
  <text class="small" x="1180" y="802">response goes back to browser extension or dashboard</text>

  <g transform="translate(600,720)">
    <rect class="step" width="250" height="100"/>
    <rect class="step-head" width="250" height="36"/>
    <text class="step-title" x="18" y="24">Redis</text>
    <text class="step-text" x="18" y="62">Fast cache for repeated checks</text>
    <text class="step-text" x="18" y="84">TTL about 1 hour</text>
  </g>

  <g transform="translate(910,720)">
    <rect class="step" width="280" height="100"/>
    <rect class="step-head" width="280" height="36"/>
    <text class="step-title" x="18" y="24">PostgreSQL</text>
    <text class="step-text" x="18" y="62">Main storage for products, sellers,</text>
    <text class="step-text" x="18" y="84">reviews and trust history</text>
  </g>

  <g transform="translate(1250,720)">
    <rect class="step" width="300" height="100"/>
    <rect class="step-head" width="300" height="36"/>
    <text class="step-title" x="18" y="24">Python anti-fraud service</text>
    <text class="step-text" x="18" y="62">Separate service for suspicious review</text>
    <text class="step-text" x="18" y="84">and rating authenticity analysis</text>
  </g>

  <path class="side-arrow" marker-end="url(#sideArrow)" d="M790 570 C790 650, 725 650, 725 720"/>
  <path class="side-arrow" marker-end="url(#sideArrow)" d="M775 280 C900 280, 1040 280, 1040 720"/>
  <path class="side-arrow" marker-end="url(#sideArrow)" d="M1565 340 C1565 410, 1400 410, 1400 720"/>

  <g transform="translate(60,900)">
    <text class="note" x="0" y="0">Full request cycle: URL intake -&gt; parsing -&gt; cache/database lookup -&gt; enrichment -&gt; anti-fraud analysis -&gt; trust score -&gt; persistence -&gt; Redis caching -&gt; response.</text>
  </g>
</svg>
